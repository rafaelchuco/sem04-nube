<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulta ONPE - Miembro de Mesa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #f4efe6;
        --bg-card: #fffdf7;
        --brand: #0b4f6c;
        --brand-2: #fb8500;
        --ok: #0f766e;
        --danger: #b91c1c;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 20%, rgba(251, 133, 0, 0.18), transparent 40%),
          radial-gradient(circle at 80% 10%, rgba(11, 79, 108, 0.2), transparent 38%),
          linear-gradient(145deg, #f7f1e7 0%, #ede5d8 100%);
      }

      .app-shell {
        max-width: 720px;
      }

      .hero {
        background: var(--bg-card);
        border: 1px solid rgba(11, 79, 108, 0.15);
        box-shadow: 0 14px 28px rgba(26, 26, 26, 0.08);
      }

      .title-mark {
        color: var(--brand);
      }

      .btn-brand {
        background: var(--brand);
        color: #fff;
      }

      .btn-brand:hover {
        background: #093d53;
        color: #fff;
      }

      .result-card {
        background: #ffffff;
        border-left: 6px solid var(--brand-2);
      }

      .pill-ok {
        color: #fff;
        background: var(--ok);
      }

      .pill-no {
        color: #fff;
        background: #6b7280;
      }

      .fade-in {
        animation: fadeIn 0.38s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="d-flex align-items-center py-5">
    <main class="container app-shell">
      <section class="hero rounded-4 p-4 p-md-5">
        <div class="mb-4">
          <p class="text-uppercase fw-semibold mb-2 title-mark">Consulta Electoral ONPE</p>
          <h1 class="h3 mb-0">Verificador de miembro de mesa</h1>
        </div>

        <form id="consultaForm" class="row g-3" novalidate>
          <div class="col-12 col-md-8">
            <label for="dniInput" class="form-label">DNI</label>
            <input
              id="dniInput"
              class="form-control form-control-lg"
              maxlength="8"
              inputmode="numeric"
              pattern="[0-9]{8}"
              placeholder="Ingresa 8 digitos"
              required
            />
          </div>
          <div class="col-12 col-md-4 d-flex align-items-end">
            <button id="consultarBtn" class="btn btn-brand btn-lg w-100" type="submit">
              Consultar
            </button>
          </div>
        </form>

        <div id="alertZone" class="mt-3" aria-live="polite"></div>

        <article id="resultado" class="result-card rounded-3 p-4 mt-4 d-none"></article>

        <hr class="my-4" />

        <section>
          <h2 class="h5 mb-3">Consulta por archivo (lote)</h2>
          <p class="text-muted small mb-3">
            Sube un archivo <code>.txt</code> o <code>.csv</code> con DNIs (8 digitos) separados por linea, coma, punto y coma o espacio.
          </p>
          <form id="loteForm" class="row g-3" novalidate>
            <div class="col-12 col-md-8">
              <label for="archivoInput" class="form-label">Archivo de DNIs</label>
              <input id="archivoInput" class="form-control" type="file" accept=".txt,.csv" required />
            </div>
            <div class="col-12 col-md-4 d-flex flex-column gap-2 align-items-stretch justify-content-end">
              <button id="loteBtn" class="btn btn-outline-primary w-100" type="submit">Procesar lote</button>
              <button id="excelBtn" class="btn btn-brand w-100" type="button">Descargar Excel</button>
            </div>
          </form>
          <div id="loteAlertZone" class="mt-3" aria-live="polite"></div>
          <div id="loteResultado" class="mt-3 d-none"></div>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("consultaForm");
      const dniInput = document.getElementById("dniInput");
      const alertZone = document.getElementById("alertZone");
      const resultado = document.getElementById("resultado");
      const consultarBtn = document.getElementById("consultarBtn");
      const loteForm = document.getElementById("loteForm");
      const archivoInput = document.getElementById("archivoInput");
      const loteBtn = document.getElementById("loteBtn");
      const excelBtn = document.getElementById("excelBtn");
      const loteAlertZone = document.getElementById("loteAlertZone");
      const loteResultado = document.getElementById("loteResultado");

      function setAlert(message, type = "danger") {
        alertZone.innerHTML = `<div class="alert alert-${type} fade-in" role="alert">${message}</div>`;
      }

      function clearAlert() {
        alertZone.innerHTML = "";
      }

      function setLoteAlert(message, type = "danger") {
        loteAlertZone.innerHTML = `<div class="alert alert-${type} fade-in" role="alert">${message}</div>`;
      }

      function clearLoteAlert() {
        loteAlertZone.innerHTML = "";
      }

      function setLoteButtonsDisabled(disabled, processingLabel = "Procesando...") {
        loteBtn.disabled = disabled;
        excelBtn.disabled = disabled;
        loteBtn.textContent = disabled ? processingLabel : "Procesar lote";
        excelBtn.textContent = disabled ? processingLabel : "Descargar Excel";
      }

      function buildLoteFormData() {
        const archivo = archivoInput.files && archivoInput.files[0];
        if (!archivo) {
          return null;
        }

        const formData = new FormData();
        formData.append("archivo", archivo);
        return formData;
      }

      function renderResultado(data) {
        const miembro = data.es_miembro_mesa;
        const miembroTexto = miembro === true ? "SI" : miembro === false ? "NO" : "NO DISPONIBLE";
        const miembroClass = miembro === true ? "pill-ok" : "pill-no";
        const campos = [
          ["Nombre", data.nombre],
          ["Miembro de mesa", miembroTexto],
          ["Rol de mesa", data.rol_mesa],
          ["Región / Provincia / Distrito", data.region_provincia_distrito],
          ["Ubicación del local", data.ubicacion_local],
          ["Local de votación", data.local_votacion],
          ["Dirección del local", data.direccion_local],
          ["Referencia", data.referencia_local],
          ["N° de Mesa", data.numero_mesa],
          ["N° de Orden", data.numero_orden],
          ["Pabellón", data.pabellon],
          ["Piso", data.piso],
          ["Aula", data.aula],
        ];

        const detalleHtml = campos
          .map(([label, value]) => {
            const displayedValue = value || "No disponible";
            return `
              <div class="d-flex flex-column flex-md-row justify-content-between gap-1 border-bottom py-2">
                <span class="fw-semibold">${escapeHtml(label)}</span>
                <span class="text-md-end">${escapeHtml(displayedValue)}</span>
              </div>
            `;
          })
          .join("");

        resultado.innerHTML = `
          <div class="fade-in">
            <h2 class="h5 mb-3">Resultado de consulta</h2>
            <div class="mb-3 d-flex align-items-center gap-2">
              <strong>Miembro de mesa:</strong>
              <span class="badge rounded-pill ${miembroClass}">${miembroTexto}</span>
            </div>
            <div>${detalleHtml}</div>
          </div>
        `;

        resultado.classList.remove("d-none");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const dni = dniInput.value.trim();
        if (!/^\d{8}$/.test(dni)) {
          setAlert("El DNI debe tener exactamente 8 digitos numericos.", "warning");
          resultado.classList.add("d-none");
          return;
        }

        consultarBtn.disabled = true;
        consultarBtn.textContent = "Consultando...";
        clearAlert();

        try {
          const response = await fetch("/consultar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dni }),
          });

          const data = await response.json();

          if (!response.ok || !data.ok) {
            setAlert(data.error || "No fue posible completar la consulta.", "danger");
            resultado.classList.add("d-none");
            return;
          }

          renderResultado(data);
        } catch (error) {
          setAlert("Error de red o del servidor al consultar ONPE.", "danger");
          resultado.classList.add("d-none");
        } finally {
          consultarBtn.disabled = false;
          consultarBtn.textContent = "Consultar";
        }
      });

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderLoteResultado(payload) {
        const rows = (payload.resultados || [])
          .map((item) => {
            const miembro = item.es_miembro_mesa;
            const miembroTexto = miembro === true ? "SI" : miembro === false ? "NO" : "NO DISPONIBLE";
            const estado = item.ok ? "OK" : "ERROR";
            const detalle = item.ok
              ? escapeHtml(item.local_votacion || "No disponible")
              : escapeHtml(item.error || "Sin detalle");
            return `
              <tr>
                <td>${escapeHtml(item.dni)}</td>
                <td>${escapeHtml(estado)}</td>
                <td>${escapeHtml(item.nombre || "No disponible")}</td>
                <td>${escapeHtml(miembroTexto)}</td>
                <td>${detalle}</td>
              </tr>
            `;
          })
          .join("");

        loteResultado.innerHTML = `
          <div class="card fade-in">
            <div class="card-body">
              <h3 class="h6 mb-3">Resultado del lote</h3>
              <p class="mb-3">
                <strong>Total:</strong> ${payload.total || 0}
                <span class="mx-2">|</span>
                <strong>Procesados:</strong> ${payload.procesados || 0}
              </p>
              <div class="table-responsive">
                <table class="table table-sm table-striped align-middle mb-0">
                  <thead>
                    <tr>
                      <th>DNI</th>
                      <th>Estado</th>
                      <th>Nombre</th>
                      <th>Miembro de mesa</th>
                      <th>Local / Error</th>
                    </tr>
                  </thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            </div>
          </div>
        `;
        loteResultado.classList.remove("d-none");
      }

      loteForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const formData = buildLoteFormData();
        if (!formData) {
          setLoteAlert("Selecciona un archivo .txt o .csv con DNIs.", "warning");
          loteResultado.classList.add("d-none");
          return;
        }

        clearLoteAlert();
        setLoteButtonsDisabled(true);

        try {
          const response = await fetch("/consultar-lote", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();

          if (!response.ok || !data.ok) {
            setLoteAlert(data.error || "No fue posible procesar el archivo.", "danger");
            loteResultado.classList.add("d-none");
            return;
          }

          renderLoteResultado(data);
          setLoteAlert("Consulta por lote finalizada.", "success");
        } catch (error) {
          setLoteAlert("Error de red o del servidor al procesar el lote.", "danger");
          loteResultado.classList.add("d-none");
        } finally {
          loteBtn.disabled = false;
          setLoteButtonsDisabled(false);
        }
      });

      excelBtn.addEventListener("click", async () => {
        const formData = buildLoteFormData();
        if (!formData) {
          setLoteAlert("Selecciona un archivo .txt o .csv con DNIs.", "warning");
          loteResultado.classList.add("d-none");
          return;
        }

        clearLoteAlert();
        setLoteButtonsDisabled(true, "Generando Excel...");

        try {
          const response = await fetch("/consultar-lote-excel", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            setLoteAlert(data.error || "No fue posible generar el Excel.", "danger");
            return;
          }

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = "consulta_onpe_lote.xlsx";
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.URL.revokeObjectURL(url);
          setLoteAlert("Excel generado y descargado correctamente.", "success");
        } catch (error) {
          setLoteAlert("Error de red o del servidor al generar el Excel.", "danger");
        } finally {
          setLoteButtonsDisabled(false);
        }
      });
    </script>
  </body>
</html>
